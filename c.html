<!DOCTYPE html>
<html lang="zh-Hant-TW">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>清除資料 | 明志科技大學選課小幫手</title>
		<link rel="stylesheet" href="/css/tocas.min.css">
		<style>
			body {
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				background-color: var(--ts-static-gray-50);
			}
			.ts-box {
				width: 100%;
				max-width: 400px;
				padding: 1rem;
			}
		</style>
	</head>
	<body>
		<div class="ts-box">
			<div class="ts-content">
				<div class="ts-header has-bottom-spaced">確定要清除資料嗎？</div>
				<div class="ts-wrap">
					<button class="ts-button is-negative" id="confirm">清除</button>
					<a class="ts-button is-secondary" href="/">回首頁</a>
				</div>
			</div>
		</div>
		<script>
			document.getElementById('confirm').addEventListener('click', async function () {
				localStorage.clear();

				if (window.indexedDB && indexedDB.databases) {
					const dbs = await indexedDB.databases();
					await Promise.all(
						dbs.map(function (db) {
							return new Promise(function (resolve) {
								const req = indexedDB.deleteDatabase(db.name);
								req.onsuccess = req.onerror = req.onblocked = resolve;
							});
						})
					);
				}

				location.href = '/';
			});
		</script>
	</body>
</html>
